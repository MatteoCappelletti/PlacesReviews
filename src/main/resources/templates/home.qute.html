<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home</title>
</head>
<body>
    <main>
        <form action="/home/search" method="get">
            <label for="name">Nome</label>
            <input type="text" name="name" id="name" placeholder="Nome">
            <label for="city">Città</label>
            <input type="text" name="city" id="city" placeholder="Città">
            <button type="submit">Cerca</button>
        </form>
        <form action="/home/coordinates" method="get" id="geo-form">
            <input type="number" step="any" style="display: none" name="latitudesearch" id="latitudesearch" readonly required>
            <input type="number" step="any" style="display: none" name="longitudesearch" id="longitudesearch" readonly required>

            <button type="button" onclick="ottieniPosizione()">Trova tramite posizione</button>
            <p id="output"></p>
        </form>

        <a href="/place/add">Aggiungi locale</a>

        {#if errorMessage}
            <p id="error">{errorMessage}</p>
        {/if}

        {#for place in places}
            <a class="place-link" href="/place/{place.id}">
                <div class="place">
                    <h3 class="place-name">{place.name}</h3>
                    <p class="place-address-city">{place.address}, {place.city}</p>
                    <p class="place-description">{place.description}</p>
                    <div class="place-categories">
                        {#for category in place.categories}
                            <div class="place-category-container">
                                <p class="place-category">{category.name}</p>
                            </div>
                        {/for}
                    </div>
                    <div class="place-images">
                        {#for media in place.medias}
                            <div class="place-image-container">
                                <img class="place-image" src="{media.path}" alt="Img">
                            </div>
                        {/for}
                    </div>
                </div>
            </a>
        {/for}

    </main>

<script>
    function ottieniPosizione() {
        const display = document.getElementById("output");
        const latitudine_input = document.getElementById("latitudesearch");
        const longitude_input = document.getElementById("longitudesearch");

        if (!navigator.geolocation) {
            display.innerHTML = "La geolocalizzazione non è supportata dal tuo browser.";
            return;
        }

        display.innerHTML = "Localizzazione in corso...";

        navigator.geolocation.getCurrentPosition(successo, errore);

        function successo(posizione) {
            const lat = posizione.coords.latitude;
            const lon = posizione.coords.longitude;

            display.innerHTML = "Latitudine: " + lat.toFixed(5) + "<br> Longitudine: " + lon.toFixed(5);

            console.log("Coordinate ottenute: Lat " + lat + ", Lon " + lon);

            latitudine_input.value = lat;
            longitude_input.value = lon;

            document.getElementById("geo-form").submit();
        }

        function errore() {
            display.innerHTML = "Impossibile recuperare la tua posizione (permesso negato o errore di rete).";
        }
    }
</script>

</body>
</html>
