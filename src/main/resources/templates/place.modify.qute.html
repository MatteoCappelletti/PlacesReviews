<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modify Place</title>
</head>
<body>
<main>
    <nav id="navbar">
        <a href="/home">HOME</a>

        <form action="/home/search" method="get">
            <label for="name">Nome</label>
            <input type="text" name="name" id="name" placeholder="Nome">
            <label for="city">Città</label>
            <input type="text" name="city" id="city" placeholder="Città">
            <button type="submit">Cerca</button>
        </form>
        <form action="/home/coordinates" method="get" id="geo-form">
            <input type="number" step="any" style="display: none" name="latitudesearch" id="latitudesearch" readonly required>
            <input type="number" step="any" style="display: none" name="longitudesearch" id="longitudesearch" readonly required>

            <button type="button" onclick="ottieniPosizione()">Trova tramite posizione</button>
            <p id="output"></p>
        </form>

        <a href="/place/add">Aggiungi locale</a>

        <a href="/login">Login</a>
        <a href="/logout">Logout</a>
    </nav>

    {#if errorMessage}
        <p id="error">{errorMessage}</p>
    {/if}

    <div id="form-container">
        <form action="" method="post">
            <label for="name">
                Nome
                <input type="text" name="name" id="name" value="{place.name}" required>
            </label>
            <br>

            <label for="description">
                Descrizione
                <input type="text" name="description" id="description" value="{place.description}" required>
            </label>
            <br>

            <label for="city">
                Città
                <input type="text" name="city" id="city" value="{place.city}" required>
            </label>
            <br>

            <label for="address">
                Indirizzo
                <input type="text" name="address" id="address" value="{place.address}" required>
            </label>
            <br>

            <label for="latitude">
                Latitudine
                <input type="number" name="latitude" id="latitude" value="{place.latitude}" required>
            </label>
            <br>

            <label for="longitude">
                Longitudine
                <input type="number" name="longitude" id="longitude" value="{place.longitude}" required>
            </label>
            <br>

            <label id="categories">
                Categorie
                {#for category in categories}
                    <label for="categories-checkbox">
                        <input type="checkbox" name="categories" {#for selectedCategory in place.categories} {#if category.name == selectedCategory.name} checked {/if} {/for}> {category.name}
                    </label>
                {/for}
            </label>
            <br>

            <label for="image-url">
                Url dell'immagine
                {#if place.medias}
                    {#for media in place.medias}
                        <input type="text" name="image-url" id="image-url" value="{media.path}">
                    {/for}
                    {#else}
                        <input type="text" name="image-url" id="image-url">
                {/if}


            </label>
            <br>

            <input type="submit" id="submit" value="Aggiungi">
            <input type="reset" id="reset" value="Cancella">
        </form>
    </div>

</main>

<script src="js/coordinates.js"></script>
</body>
</html>
