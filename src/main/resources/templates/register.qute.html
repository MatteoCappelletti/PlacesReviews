<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Register</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav id="navbar">
    <a href="/home">HOME</a>

    <form action="/home/search" method="get">
        <label for="name">Nome</label>
        <input type="text" name="name" id="name-search" placeholder="Nome">
        <label for="city">Città</label>
        <input type="text" name="city" id="city-search" placeholder="Città">
        <button type="submit">Cerca</button>
    </form>
    <form action="/home/coordinates" method="get" id="geo-form">
        <input type="number" step="any" style="display: none" name="latitudesearch" id="latitudesearch" readonly required>
        <input type="number" step="any" style="display: none" name="longitudesearch" id="longitudesearch" readonly required>

        <button type="button" onclick="ottieniPosizione()">Trova tramite posizione</button>
        <p id="output"></p>
    </form>

    <a href="/place/add">Aggiungi locale</a>

    <a href="/login">Login</a>
    <a href="/logout">Logout</a>
</nav>

<main>
    <form action="/register" method="post">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" placeholder="Username" required>
        <br>
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Password" required>
        <br>
        <label for="verified_password">Password</label>
        <input type="password" name="verified_password" id="verified_password" placeholder="Verify password" required>
        <br>
        <button type="submit">Registrati</button>
        <button type="reset">Cancella</button>
    </form>
    <br>
    {#if errorMessage}
        <p id="error">{errorMessage}</p>
    {/if}

    <p>Hai già un account? <a href="/login">Accedi</a></p>
</main>

<script src="/js/coordinates.js"></script>
</body>
</html>
